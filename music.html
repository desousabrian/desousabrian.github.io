<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trakdb — music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" href="trakdb.ico">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--surface:#0f0f0f;--card:#141414;--card-h:#1a1a1a;
  --border:#202020;--border-b:#2e2e2e;--text:#e0e0e0;--muted:#505050;--dim:#303030;
  --accent:#8b76ff;--accent-d:rgba(139,118,255,.14);--accent-g:rgba(139,118,255,.28);
  --cyan:#36d9d9;--cyan-d:rgba(54,217,217,.12);
  --gold:#f5c040;--gold-d:rgba(245,192,64,.12);
  --radius:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Geist',system-ui,sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:600px;height:600px;background:rgba(139,118,255,.07);top:-200px;left:-150px}
.orb-2{width:500px;height:500px;background:rgba(54,217,217,.05);bottom:-100px;right:-100px}
.wrap{max-width:900px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

.topnav{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:36px;align-items:center}
.topnav-link{font-size:14px;color:var(--muted);text-decoration:none;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;transition:color .15s}
.topnav-link:hover,.topnav-link.active{color:var(--text)}

header{padding:36px 0 28px;display:flex;align-items:center;gap:14px;position:relative}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--accent-g);flex-shrink:0;text-decoration:none}
.logo-mark svg{color:#fff}
.logo-name{font-size:19px;font-weight:600;letter-spacing:-.5px;color:var(--text);font-family:'Geist Mono',monospace;text-decoration:none}
.logo-name em{font-style:normal;color:var(--accent)}

.page-title{font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:20px}

/* Artist grid */
.artist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:16px}
.artist-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  text-decoration:none;color:var(--text);transition:background .15s,border-color .15s;
  display:flex;flex-direction:column;overflow:hidden;
}
.artist-card:hover{background:var(--card-h);border-color:var(--border-b)}
.artist-card-cover{width:100%;aspect-ratio:1;position:relative;overflow:hidden}
.artist-card-cover canvas{display:block;width:100%;height:100%}
.artist-card-body{padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.artist-card-name{font-size:19px;font-weight:600;letter-spacing:-.3px}
.artist-card-meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}

footer{padding:28px 0 44px;text-align:center;font-size:11.5px;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.footer-badge{color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;letter-spacing:.3px;font-size:11px;white-space:nowrap}
.footer-sep{color:var(--dim)}

@media(max-width:580px){
  .topnav{gap:20px}.topnav-link{font-size:13px}
  .artist-grid{grid-template-columns:1fr}
}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2d1b69,#8b76ff);border:1.5px solid var(--border-b);margin-left:auto;flex-shrink:0;cursor:pointer;transition:opacity .15s;overflow:hidden;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:12px;font-family:"JetBrains Mono",monospace}
.avatar:hover{opacity:.8}

/* Create artist */
.create-artist-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 18px;margin-bottom:80px;
  background:transparent;border:1px dashed var(--border-b);border-radius:var(--radius);
  color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;
  cursor:pointer;transition:background .15s,color .15s,border-color .15s;
}
.create-artist-row:hover{background:var(--card);color:var(--text);border-color:var(--accent-g)}
.create-status{
  margin-top:-64px;margin-bottom:80px;font-family:'JetBrains Mono',monospace;
  font-size:12px;color:var(--muted);text-align:center;min-height:14px;
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="wrap">

  <header>
    <div class="logo">
      <a href="index.html" class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="7" width="3" height="4" rx="1" fill="white"/>
          <rect x="6" y="4" width="3" height="10" rx="1" fill="white" opacity=".85"/>
          <rect x="11" y="6" width="3" height="7" rx="1" fill="white" opacity=".65"/>
          <rect x="16" y="8" width="1.5" height="3" rx=".75" fill="white" opacity=".45"/>
        </svg>
      </a>
      <a href="index.html" class="logo-name">trak<em>db</em></a>
    </div>
    <nav class="topnav">
      <a href="index.html" class="topnav-link">home</a>
      <a href="music.html" class="topnav-link active">music</a>
      <a href="tools.html" class="topnav-link">tools</a>
      <a href="#" class="topnav-link">licenses</a>
      <a href="#" class="topnav-link">payments</a>
    </nav>
    <div class="avatar" title="profile">?</div>
  </header>

  <div class="page-title">Artists</div>
  <div class="artist-grid" id="artist-grid"></div>

  <div class="create-artist-row" id="create-artist-row">+ create artist</div>
  <div class="create-status" id="create-status"></div>

  <footer>© 2026 trakdb</footer>

</div>
<script>
const ARTISTS = [
  { name: 'Notbrian',    trackCount: 5, avatar: 'artists/Notbrian/avatar.jpeg', colors: ['#2d1b69','#1a3a6b','#0d4a6e'] },
  { name: 'NEVERHOME',   trackCount: 0, colors: ['#3a0a0a','#6b0d0d','#1a0a0a'] },
  { name: 'The Strokes', trackCount: 0, colors: ['#1a3a1a','#0d4a2e','#0a1a0a'] },
  { name: 'U2',          trackCount: 0, colors: ['#1a1a3a','#0d1a6b','#0a0a2e'] },
];

function drawCover(canvas, colors) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = rect.width  || canvas.offsetWidth  || 300;
  const h = rect.height || canvas.offsetHeight || 300;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const g = ctx.createRadialGradient(w*.3, h*.35, 0, w*.5, h*.5, w*.85);
  g.addColorStop(0,   colors[0]);
  g.addColorStop(.55, colors[1]);
  g.addColorStop(1,   colors[2]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 4000; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*.04})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
}

const grid = document.getElementById('artist-grid');

function renderArtistCard(a) {
  const card = document.createElement('a');
  card.href = `artist.html?artist=${encodeURIComponent(a.name)}`;
  card.className = 'artist-card';

  const coverDiv = document.createElement('div');
  coverDiv.className = 'artist-card-cover';
  if (a.avatar) {
    const img = document.createElement('img');
    img.src = a.avatar;
    img.alt = a.name;
    img.style.cssText = 'display:block;width:100%;height:100%;object-fit:cover;object-position:center';
    coverDiv.appendChild(img);
  } else {
    const canvas = document.createElement('canvas');
    coverDiv.appendChild(canvas);
    requestAnimationFrame(() => drawCover(canvas, a.colors));
  }

  const body = document.createElement('div');
  body.className = 'artist-card-body';
  body.innerHTML = `
    <div class="artist-card-name">${a.name}</div>
    <div class="artist-card-meta">${a.trackCount > 0 ? `${a.trackCount} track${a.trackCount !== 1 ? 's' : ''}` : 'No tracks yet'}</div>
  `;

  card.appendChild(coverDiv);
  card.appendChild(body);
  grid.appendChild(card);
}

ARTISTS.forEach(renderArtistCard);

/* ---- Create artist (commits folder structure + patches source files to GitHub) ---- */
const GH_OWNER  = 'desousabrian';
const GH_REPO   = 'desousabrian.github.io';
const GH_BRANCH = 'main';

const PALETTES = [
  ['#2d1b69','#1a3a6b','#080818'],
  ['#3a0a0a','#6b0d0d','#1a0a0a'],
  ['#1a3a1a','#0d4a2e','#0a1a0a'],
  ['#1a1a3a','#0d1a6b','#0a0a2e'],
  ['#3a1a2e','#6b0d4a','#1a0a1a'],
  ['#2a1a0a','#4a3010','#1a0a00'],
  ['#0a1a3a','#0d2e6b','#000a1a'],
  ['#1a2a0a','#2e4a0d','#0a1a00'],
];

function nameToColors(name) {
  let h = 0;
  for (const c of name) h = ((h * 31) + c.charCodeAt(0)) >>> 0;
  return PALETTES[h % PALETTES.length];
}

function ghHeaders(pat) {
  return { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github+json' };
}

function utf8ToB64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary);
}

function b64ToUtf8(b64) {
  const binary = atob(b64.replace(/\n/g, ''));
  const bytes  = Uint8Array.from(binary, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

const createStatusEl = document.getElementById('create-status');

function setStatus(msg, isError) {
  createStatusEl.textContent = msg;
  createStatusEl.style.color = isError ? '#e0667a' : 'var(--muted)';
}

function getPat() {
  let pat = localStorage.getItem('gh_pat');
  if (!pat) {
    pat = window.prompt('GitHub personal access token (needs "repo" scope) — stored locally in this browser only:');
    if (pat) localStorage.setItem('gh_pat', pat.trim());
  }
  return pat ? pat.trim() : null;
}

async function getValidPat() {
  for (let attempt = 0; attempt < 3; attempt++) {
    const pat = getPat();
    if (!pat) return null;
    setStatus('Checking token…');
    let res;
    try {
      res = await fetch('https://api.github.com/user', { headers: ghHeaders(pat) });
    } catch (e) {
      setStatus('Could not reach GitHub — check your connection.', true);
      return null;
    }
    if (res.ok) return pat;
    localStorage.removeItem('gh_pat');
    window.alert(res.status === 401
      ? 'That token was rejected by GitHub (invalid or expired). Try again with a fresh one.'
      : `GitHub rejected that token (status ${res.status}). Try again.`);
  }
  setStatus('Cancelled — too many invalid tokens.', true);
  return null;
}

async function ghGetFile(pat, path) {
  const res = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}?ref=${GH_BRANCH}`,
    { headers: ghHeaders(pat) }
  );
  if (!res.ok) {
    if (res.status === 401 || res.status === 403) localStorage.removeItem('gh_pat');
    throw new Error(`Could not fetch ${path} (${res.status})`);
  }
  return res.json();
}

async function ghPutFile(pat, path, content, sha, message) {
  const body = { message, content: utf8ToB64(content), branch: GH_BRANCH };
  if (sha) body.sha = sha;
  const res = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`,
    { method: 'PUT', headers: ghHeaders(pat), body: JSON.stringify(body) }
  );
  if (!res.ok) {
    if (res.status === 401 || res.status === 403) localStorage.removeItem('gh_pat');
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `Commit failed (${res.status})`);
  }
  return res.json();
}

document.getElementById('create-artist-row').addEventListener('click', async () => {
  const name = window.prompt('Artist name:');
  if (!name || !name.trim()) { setStatus('Cancelled.'); return; }
  const artistName = name.trim();

  if (ARTISTS.find(a => a.name.toLowerCase() === artistName.toLowerCase())) {
    setStatus(`"${artistName}" already exists.`, true);
    return;
  }

  const pat = await getValidPat();
  if (!pat) return;

  const colors = nameToColors(artistName);

  try {
    // 1. Create artists/<name>/songs/.gitkeep (creates both folders in one commit)
    setStatus('Creating artist folder…');
    const keepPath = `artists/${encodeURIComponent(artistName)}/songs/.gitkeep`;
    await ghPutFile(pat, keepPath, '', null, `Create artist: ${artistName}`);

    // 2. Patch music.html — insert new entry into ARTISTS array
    setStatus('Updating artist list…');
    const musicFile = await ghGetFile(pat, 'music.html');
    const musicSrc  = b64ToUtf8(musicFile.content);
    const newMusicEntry = `  { name: '${artistName.replace(/'/g,"\\'")}', trackCount: 0, colors: ${JSON.stringify(colors)} },`;
    const musicIdx  = musicSrc.indexOf('const ARTISTS = [');
    const musicClose = musicSrc.indexOf('];', musicIdx);
    const newMusicSrc = musicSrc.slice(0, musicClose) + newMusicEntry + '\n' + musicSrc.slice(musicClose);
    await ghPutFile(pat, 'music.html', newMusicSrc, musicFile.sha, `Add ${artistName} to artist list`);

    // 3. Patch artist.html — insert new entry into ARTIST_DB
    setStatus('Updating artist database…');
    const artistFile = await ghGetFile(pat, 'artist.html');
    const artistSrc  = b64ToUtf8(artistFile.content);
    const newDbEntry = `  '${artistName.replace(/'/g,"\\'")}': { age: '—', based: '—', pronouns: '—', role: '—', colors: ${JSON.stringify(colors)}, tracks: [] },`;
    const dbIdx   = artistSrc.indexOf('const ARTIST_DB = {');
    const dbClose = artistSrc.indexOf('\n};', dbIdx);
    const newArtistSrc = artistSrc.slice(0, dbClose) + '\n' + newDbEntry + artistSrc.slice(dbClose);
    await ghPutFile(pat, 'artist.html', newArtistSrc, artistFile.sha, `Add ${artistName} to ARTIST_DB`);

    // 4. Reflect in page immediately
    const newArtist = { name: artistName, trackCount: 0, colors };
    ARTISTS.push(newArtist);
    renderArtistCard(newArtist);

    setStatus(`Created "${artistName}" ✓`);
  } catch (err) {
    console.error(err);
    setStatus(`Failed: ${err.message}`, true);
  }
});
</script>
<style>
.avatar-wrap{position:relative;margin-left:auto;flex-shrink:0}
.avatar-wrap .avatar{margin-left:0}
.avatar-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--border-b);border-radius:10px;padding:8px 0;min-width:160px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.avatar-menu.open{display:block}
.avatar-menu-name{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);padding:6px 14px 10px;letter-spacing:.3px}
.avatar-menu-item{display:block;width:100%;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);background:none;border:none;text-align:left;cursor:pointer;transition:background .1s}
.avatar-menu-item:hover{background:var(--card-h)}
</style>
<script>
(function(){
  const el = document.querySelector('.avatar');
  if (!el) return;
  const wrap = document.createElement('div');
  wrap.className = 'avatar-wrap';
  el.parentNode.insertBefore(wrap, el);
  wrap.appendChild(el);
  const session = JSON.parse(localStorage.getItem('trakdb_session') || 'null');
  if (session) {
    el.innerHTML = '';
    el.style.background = 'none';
    const img = document.createElement('img');
    img.src = session.avatar;
    img.alt = session.username;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
    el.appendChild(img);
    el.title = session.username;
    const menu = document.createElement('div');
    menu.className = 'avatar-menu';
    menu.innerHTML = `<div class="avatar-menu-name">${session.username}</div><button class="avatar-menu-item" id="logout-btn">log out</button>`;
    wrap.appendChild(menu);
    el.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('open'); });
    document.addEventListener('click', () => menu.classList.remove('open'));
    menu.querySelector('#logout-btn').addEventListener('click', () => { localStorage.removeItem('trakdb_session'); location.href = 'login.html'; });
  } else {
    el.addEventListener('click', () => location.href = 'login.html');
    el.title = 'log in';
  }
})();
</script>
</body>
</html>
