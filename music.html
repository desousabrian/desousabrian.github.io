<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trakdb — music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" href="trakdb.ico">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--surface:#0f0f0f;--card:#141414;--card-h:#1a1a1a;
  --border:#202020;--border-b:#2e2e2e;--text:#e0e0e0;--muted:#505050;--dim:#303030;
  --accent:#8b76ff;--accent-d:rgba(139,118,255,.14);--accent-g:rgba(139,118,255,.28);
  --cyan:#36d9d9;--cyan-d:rgba(54,217,217,.12);
  --gold:#f5c040;--gold-d:rgba(245,192,64,.12);
  --radius:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Geist',system-ui,sans-serif;font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:600px;height:600px;background:rgba(139,118,255,.07);top:-200px;left:-150px}
.orb-2{width:500px;height:500px;background:rgba(54,217,217,.05);bottom:-100px;right:-100px}
.wrap{max-width:900px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

.topnav{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:36px;align-items:center}
.topnav-link{font-size:14px;color:var(--muted);text-decoration:none;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;transition:color .15s}
.topnav-link:hover,.topnav-link.active{color:var(--text)}

header{padding:36px 0 28px;display:flex;align-items:center;gap:14px;position:relative}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--accent-g);flex-shrink:0;text-decoration:none}
.logo-mark svg{color:#fff}
.logo-name{font-size:19px;font-weight:600;letter-spacing:-.5px;color:var(--text);font-family:'Geist Mono',monospace;text-decoration:none}
.logo-name em{font-style:normal;color:var(--accent)}

.page-title{font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:20px}

/* Artist grid */
.artist-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:80px}
.artist-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  text-decoration:none;color:var(--text);transition:background .15s,border-color .15s;
  display:flex;flex-direction:column;overflow:hidden;
}
.artist-card:hover{background:var(--card-h);border-color:var(--border-b)}
.artist-card-cover{width:100%;aspect-ratio:1;position:relative;overflow:hidden}
.artist-card-cover canvas{display:block;width:100%;height:100%}
.artist-card-body{padding:18px 20px;display:flex;flex-direction:column;gap:6px}
.artist-card-name{font-size:19px;font-weight:600;letter-spacing:-.3px}
.artist-card-meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}

footer{padding:28px 0 44px;text-align:center;font-size:11.5px;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.footer-badge{color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 9px;letter-spacing:.3px;font-size:11px;white-space:nowrap}
.footer-sep{color:var(--dim)}

@media(max-width:580px){
  .topnav{gap:20px}.topnav-link{font-size:13px}
  .artist-grid{grid-template-columns:1fr}
}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2d1b69,#8b76ff);border:1.5px solid var(--border-b);margin-left:auto;flex-shrink:0;cursor:pointer;transition:opacity .15s;overflow:hidden;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:12px;font-family:"JetBrains Mono",monospace}
.avatar:hover{opacity:.8}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="wrap">

  <header>
    <div class="logo">
      <a href="index.html" class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="7" width="3" height="4" rx="1" fill="white"/>
          <rect x="6" y="4" width="3" height="10" rx="1" fill="white" opacity=".85"/>
          <rect x="11" y="6" width="3" height="7" rx="1" fill="white" opacity=".65"/>
          <rect x="16" y="8" width="1.5" height="3" rx=".75" fill="white" opacity=".45"/>
        </svg>
      </a>
      <a href="index.html" class="logo-name">trak<em>db</em></a>
    </div>
    <nav class="topnav">
      <a href="index.html" class="topnav-link">home</a>
      <a href="music.html" class="topnav-link active">music</a>
      <a href="tools.html" class="topnav-link">tools</a>
      <a href="#" class="topnav-link">licenses</a>
      <a href="#" class="topnav-link">payments</a>
    </nav>
    <div class="avatar" title="profile">?</div>
  </header>

  <div class="page-title">Artists</div>
  <div class="artist-grid" id="artist-grid"></div>

  <footer>
    <span class="footer-badge">100% client-side · no uploads</span>
    <span class="footer-sep">·</span>
    All processing happens in your browser — no data leaves your device.
  </footer>

</div>
<script>
const ARTISTS = [
  { name: 'Notbrian',    trackCount: 5, avatar: 'artists/Notbrian/avatar.jpeg', colors: ['#2d1b69','#1a3a6b','#0d4a6e'] },
  { name: 'NEVERHOME',   trackCount: 0, colors: ['#3a0a0a','#6b0d0d','#1a0a0a'] },
  { name: 'The Strokes', trackCount: 0, colors: ['#1a3a1a','#0d4a2e','#0a1a0a'] },
  { name: 'U2',          trackCount: 0, colors: ['#1a1a3a','#0d1a6b','#0a0a2e'] },
];

function drawCover(canvas, colors) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = rect.width  || canvas.offsetWidth  || 300;
  const h = rect.height || canvas.offsetHeight || 300;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const g = ctx.createRadialGradient(w*.3, h*.35, 0, w*.5, h*.5, w*.85);
  g.addColorStop(0,   colors[0]);
  g.addColorStop(.55, colors[1]);
  g.addColorStop(1,   colors[2]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 4000; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*.04})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
}

const grid = document.getElementById('artist-grid');

ARTISTS.forEach(a => {
  const card = document.createElement('a');
  card.href = `artist.html?artist=${encodeURIComponent(a.name)}`;
  card.className = 'artist-card';

  const coverDiv = document.createElement('div');
  coverDiv.className = 'artist-card-cover';
  if (a.avatar) {
    const img = document.createElement('img');
    img.src = a.avatar;
    img.alt = a.name;
    img.style.cssText = 'display:block;width:100%;height:100%;object-fit:cover;object-position:center';
    coverDiv.appendChild(img);
  } else {
    const canvas = document.createElement('canvas');
    coverDiv.appendChild(canvas);
    requestAnimationFrame(() => drawCover(canvas, a.colors));
  }

  const body = document.createElement('div');
  body.className = 'artist-card-body';
  body.innerHTML = `
    <div class="artist-card-name">${a.name}</div>
    <div class="artist-card-meta">${a.trackCount > 0 ? `${a.trackCount} track${a.trackCount !== 1 ? 's' : ''}` : 'No tracks yet'}</div>
  `;

  card.appendChild(coverDiv);
  card.appendChild(body);
  grid.appendChild(card);

});
</script>
</body>
</html>
