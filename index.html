<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trakdb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" href="trakdb.ico">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--surface:#0f0f0f;--card:#141414;--card-h:#1a1a1a;
  --border:#202020;--border-b:#2e2e2e;--text:#e0e0e0;--muted:#505050;--dim:#303030;
  --accent:#8b76ff;--accent-d:rgba(139,118,255,.14);--accent-g:rgba(139,118,255,.28);
  --cyan:#36d9d9;--cyan-d:rgba(54,217,217,.12);
  --gold:#f5c040;--gold-d:rgba(245,192,64,.12);
  --radius:14px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Geist',system-ui,sans-serif;font-size:15px;line-height:1.6;
  min-height:100vh;overflow-x:hidden;
}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:700px;height:700px;background:rgba(139,118,255,.08);top:-250px;left:-200px}
.orb-2{width:600px;height:600px;background:rgba(54,217,217,.05);bottom:-150px;right:-150px}
.orb-3{width:400px;height:400px;background:rgba(245,192,64,.04);top:40%;left:30%}
.wrap{max-width:900px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* Nav */
.topnav{
  position:absolute;left:50%;transform:translateX(-50%);
  display:flex;gap:36px;align-items:center;
}
.topnav-link{
  font-size:14px;color:var(--muted);text-decoration:none;
  font-family:'JetBrains Mono',monospace;letter-spacing:.3px;transition:color .15s;
}
.topnav-link:hover,.topnav-link.active{color:var(--text)}

header{
  padding:36px 0 28px;display:flex;align-items:center;gap:14px;position:relative;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:34px;height:34px;background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px var(--accent-g);flex-shrink:0;text-decoration:none;
}
.logo-name{
  font-size:19px;font-weight:600;letter-spacing:-.5px;color:var(--text);
  font-family:'Geist Mono',monospace;text-decoration:none;
}
.logo-name em{font-style:normal;color:var(--accent)}

/* Hero */
.hero{padding:72px 0 80px;display:flex;flex-direction:column;gap:28px;align-items:center;text-align:center}
.hero-eyebrow{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--accent);letter-spacing:2px;text-transform:uppercase;
}
.hero-title{
  font-size:clamp(40px,7vw,72px);font-weight:600;
  letter-spacing:-2px;line-height:1.0;color:var(--text);max-width:700px;
}
.hero-title em{font-style:normal;color:var(--accent)}
.hero-sub{font-size:17px;color:var(--muted);max-width:480px;line-height:1.65}
.hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent);color:#fff;text-decoration:none;
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:10px;transition:opacity .15s;
  box-shadow:0 0 28px var(--accent-g);
}
.btn-primary:hover{opacity:.85}
.btn-secondary{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--card);color:var(--text);text-decoration:none;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  padding:10px 20px;border-radius:10px;border:1px solid var(--border);
  transition:border-color .15s;
}
.btn-secondary:hover{border-color:var(--border-b)}

/* Section label */
.section-label{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;
}

/* Latest release */
.latest{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px 24px;display:flex;align-items:center;gap:20px;
  text-decoration:none;color:var(--text);transition:background .15s,border-color .15s;
  margin-bottom:64px;
}
.latest:hover{background:var(--card-h);border-color:var(--border-b)}
.latest-art{width:56px;height:56px;border-radius:10px;overflow:hidden;flex-shrink:0}
#latest-canvas{display:block;width:100%;height:100%}
.latest-info{flex:1;min-width:0}
.latest-eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.latest-title{font-size:17px;font-weight:600;letter-spacing:-.3px}
.latest-meta{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px}
.latest-arrow{color:var(--muted);flex-shrink:0}

/* Featured grid */
.featured{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:80px}
.featured-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;text-decoration:none;color:var(--text);
  transition:background .15s,border-color .15s;display:flex;flex-direction:column;gap:8px;
}
.featured-card:hover{background:var(--card-h);border-color:var(--border-b)}
.featured-card-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.featured-card-title{font-size:20px;font-weight:600;letter-spacing:-.3px}
.featured-card-sub{font-size:13px;color:var(--muted)}
.featured-card-badges{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.f-badge{font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:5px;padding:2px 8px}
.f-bpm{color:var(--cyan);background:var(--cyan-d);border:1px solid rgba(54,217,217,.22)}
.f-dur{color:var(--muted);background:var(--card-h);border:1px solid var(--border-b)}

/* Footer */
footer{
  padding:28px 0 44px;text-align:center;font-size:11.5px;color:var(--dim);
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
}
.footer-badge{
  color:var(--muted);background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:3px 9px;letter-spacing:.3px;font-size:11px;white-space:nowrap;
}
.footer-sep{color:var(--dim)}

@media(max-width:600px){
  .topnav{gap:20px}.topnav-link{font-size:13px}
  .hero{padding:48px 0 56px}
  .featured{grid-template-columns:1fr}
}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2d1b69,#8b76ff);border:1.5px solid var(--border-b);margin-left:auto;flex-shrink:0;cursor:pointer;transition:opacity .15s;overflow:hidden;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:12px;font-family:"JetBrains Mono",monospace}
.avatar:hover{opacity:.8}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="wrap">

  <header>
    <div class="logo">
      <a href="index.html" class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="1" y="7" width="3" height="4" rx="1" fill="white"/>
          <rect x="6" y="4" width="3" height="10" rx="1" fill="white" opacity=".85"/>
          <rect x="11" y="6" width="3" height="7" rx="1" fill="white" opacity=".65"/>
          <rect x="16" y="8" width="1.5" height="3" rx=".75" fill="white" opacity=".45"/>
        </svg>
      </a>
      <a href="index.html" class="logo-name">trak<em>db</em></a>
    </div>
    <nav class="topnav">
      <a href="index.html" class="topnav-link active">home</a>
      <a href="music.html" class="topnav-link">music</a>
      <a href="#" class="topnav-link">licenses</a>
      <a href="#" class="topnav-link">payments</a>
      <a href="tools.html" class="topnav-link">tools</a>
    </nav>
    <div class="avatar" title="profile">?</div>
  </header>

  <section class="hero">
<h1 class="hero-title">The complete platform for your music catalog.</h1>
    <p class="hero-sub">Manage recordings, licenses, payments, and everything else—all from one place.</p>
    <div class="hero-actions">
      <a href="features.html" class="btn-secondary">learn more</a>
      <a href="login.html" class="btn-primary">log in</a>
    </div>
  </section>

  <footer>© 2026 trakdb</footer>

</div>
<script>
const TRACKS = [
  { name: 'Cold Summer',        bpm: 184, duration: '1:52', colors: ['#2d1b69','#1a3a6b','#0d4a6e'] },
  { name: 'College Sweetheart', bpm: 125, duration: '2:57', colors: ['#6b1a4a','#8b2252','#3d1a6b'] },
  { name: 'Multicolor',         bpm: 125, duration: '2:06', colors: ['#1a4a2e','#1a3a6b','#4a1a6b'] },
  { name: 'Northstar',          bpm: 145, duration: '2:19', colors: ['#0d2a4a','#0a3a4a','#1a2a5e'] },
  { name: 'Pilot 43',           bpm: 138, duration: '3:12', colors: ['#4a2a0a','#6b3a0d','#3a1a0a'] },
];

function drawCover(canvas, colors, w, h) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const g = ctx.createRadialGradient(w*.35, h*.3, 0, w*.5, h*.5, w*.8);
  g.addColorStop(0, colors[0]);
  g.addColorStop(.5, colors[1]);
  g.addColorStop(1, colors[2]);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 1200; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*.05})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
}

drawCover(document.getElementById('latest-canvas'), TRACKS[4].colors, 56, 56);

const grid = document.getElementById('featured-grid');
TRACKS.slice(0, 4).forEach((t, i) => {
  const card = document.createElement('a');
  card.href = `track.html?track=${i}`;
  card.className = 'featured-card';
  card.innerHTML = `
    <div class="featured-card-label">Track ${i + 1}</div>
    <div class="featured-card-title">${t.name}</div>
    <div class="featured-card-sub">Artist Name</div>
    <div class="featured-card-badges">
      <span class="f-badge f-bpm">${t.bpm} BPM</span>
      <span class="f-badge f-dur">${t.duration}</span>
    </div>
  `;
  grid.appendChild(card);
});
</script>
<style>
.avatar-wrap{position:relative;margin-left:auto;flex-shrink:0}
.avatar-wrap .avatar{margin-left:0}
.avatar-menu{display:none;position:absolute;top:calc(100% + 8px);right:0;background:var(--card);border:1px solid var(--border-b);border-radius:10px;padding:8px 0;min-width:160px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.avatar-menu.open{display:block}
.avatar-menu-name{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);padding:6px 14px 10px;letter-spacing:.3px}
.avatar-menu-item{display:block;width:100%;padding:8px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);background:none;border:none;text-align:left;cursor:pointer;transition:background .1s}
.avatar-menu-item:hover{background:var(--card-h)}
</style>
<script>
(function(){
  const el = document.querySelector('.avatar');
  if (!el) return;
  const wrap = document.createElement('div');
  wrap.className = 'avatar-wrap';
  el.parentNode.insertBefore(wrap, el);
  wrap.appendChild(el);
  const session = JSON.parse(localStorage.getItem('trakdb_session') || 'null');
  if (session) {
    el.innerHTML = '';
    el.style.background = 'none';
    const img = document.createElement('img');
    img.src = session.avatar;
    img.alt = session.username;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';
    el.appendChild(img);
    el.title = session.username;
    const menu = document.createElement('div');
    menu.className = 'avatar-menu';
    menu.innerHTML = `<div class="avatar-menu-name">${session.username}</div><button class="avatar-menu-item" id="logout-btn">log out</button>`;
    wrap.appendChild(menu);
    el.addEventListener('click', e => { e.stopPropagation(); menu.classList.toggle('open'); });
    document.addEventListener('click', () => menu.classList.remove('open'));
    menu.querySelector('#logout-btn').addEventListener('click', () => { localStorage.removeItem('trakdb_session'); location.href = 'login.html'; });
  } else {
    el.addEventListener('click', () => location.href = 'login.html');
    el.title = 'log in';
    document.querySelectorAll('.topnav-link').forEach(l => {
      if (['music', 'licenses', 'payments'].includes(l.textContent.trim())) l.href = 'features.html';
    });
  }
})();
</script>
</body>
</html>
