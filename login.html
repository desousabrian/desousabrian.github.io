<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trakdb — log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" href="trakdb.ico">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--surface:#0f0f0f;--card:#141414;--card-h:#1a1a1a;
  --border:#202020;--border-b:#2e2e2e;--text:#e0e0e0;--muted:#505050;--dim:#303030;
  --accent:#8b76ff;--accent-d:rgba(139,118,255,.14);--accent-g:rgba(139,118,255,.28);
  --radius:14px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Geist',system-ui,sans-serif;font-size:15px;line-height:1.6;
  min-height:100vh;overflow-x:hidden;
  display:flex;align-items:center;justify-content:center;
}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb-1{width:600px;height:600px;background:rgba(139,118,255,.03);top:-200px;left:-150px}
.orb-2{width:500px;height:500px;background:rgba(54,217,217,.02);bottom:-100px;right:-100px}

.login-wrap{
  position:relative;z-index:1;
  width:100%;max-width:380px;padding:24px;
}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:36px;justify-content:center}
.logo-mark{
  width:34px;height:34px;background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px var(--accent-g);flex-shrink:0;text-decoration:none;
}
.logo-name{
  font-size:19px;font-weight:600;letter-spacing:-.5px;color:var(--text);
  font-family:'Geist Mono',monospace;text-decoration:none;
}
.logo-name em{font-style:normal;color:var(--accent)}

.login-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:32px;display:flex;flex-direction:column;gap:20px;
}
.login-title{
  font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:4px;
}
.field{display:flex;flex-direction:column;gap:6px}
.field label{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--muted);letter-spacing:.8px;text-transform:uppercase;
}
.field input{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;color:var(--text);font-family:'Geist',sans-serif;font-size:14px;
  outline:none;transition:border-color .15s;
}
.field input:focus{border-color:var(--accent)}
.login-btn{
  width:100%;padding:11px 0;background:var(--accent);color:#fff;
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;
  border:none;border-radius:10px;cursor:pointer;
  box-shadow:0 0 24px var(--accent-g);transition:opacity .15s;letter-spacing:.3px;
}
.login-btn:hover{opacity:.85}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-error{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  color:#e0667a;text-align:center;min-height:16px;
}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-wrap">
  <div class="login-logo">
    <a href="index.html" class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1" y="7" width="3" height="4" rx="1" fill="white"/>
        <rect x="6" y="4" width="3" height="10" rx="1" fill="white" opacity=".85"/>
        <rect x="11" y="6" width="3" height="7" rx="1" fill="white" opacity=".65"/>
        <rect x="16" y="8" width="1.5" height="3" rx=".75" fill="white" opacity=".45"/>
      </svg>
    </a>
    <a href="index.html" class="logo-name">trak<em>db</em></a>
  </div>

  <div class="login-card">
    <div class="login-title">Log in</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" placeholder="Username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="Password">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn">log in</button>
  </div>
</div>

<script>
/* NOTE: credentials are loaded from accounts/logins.csv — demo-grade only.
   On a public repo this file is visible to anyone with the URL. */

async function loadAccounts() {
  const res = await fetch('accounts/logins.csv');
  const text = await res.text();
  return text.split('\n')
    .slice(1) // skip header
    .map(line => line.split(',').map(s => s.trim()))
    .filter(cols => cols[0])
    .map(cols => ({ username: cols[0], password: cols[1], email: cols[2] }));
}

const usernameEl = document.getElementById('username');
const passwordEl = document.getElementById('password');
const loginBtn   = document.getElementById('login-btn');
const errorEl    = document.getElementById('login-error');

async function attemptLogin() {
  errorEl.textContent = '';
  loginBtn.disabled = true;
  loginBtn.textContent = 'checking…';

  if (!usernameEl.value.trim()) {
    errorEl.textContent = 'Please enter a username.';
    loginBtn.disabled = false;
    loginBtn.textContent = 'log in';
    usernameEl.focus();
    return;
  }

  localStorage.setItem('trakdb_session', JSON.stringify({
    username: 'Admin1',
    email: 'email@email.com',
    avatar: 'accounts/Admin1/avatar.png',
  }));

  location.href = 'index.html';
}

loginBtn.addEventListener('click', attemptLogin);
[usernameEl, passwordEl].forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); })
);
</script>
</body>
</html>
